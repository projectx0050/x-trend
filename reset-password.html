<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — X-Trend</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      font-style: italic;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 15px;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: #f0f0f0;
      padding: 13px 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }

    input[type="password"]:focus {
      border-color: #7c3aed;
    }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.08);
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width .3s, background .3s;
    }

    .strength-label {
      font-size: 11px;
      color: #6060a0;
      margin-top: 5px;
      min-height: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }

    .btn:hover:not(:disabled) { opacity: .88; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .msg {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
    }

    .msg.success {
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.25);
      color: #86efac;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #7c3aed;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <span class="logo">X-Trend</span>
  <h1 id="heading">Reset your password</h1>
  <p class="sub" id="sub">Choose a new password for your X-Trend account.</p>

  <div id="form-wrap">
    <div class="field">
      <label for="new-pw">New Password</label>
      <input type="password" id="new-pw" placeholder="At least 8 characters" autocomplete="new-password" />
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="field">
      <label for="confirm-pw">Confirm Password</label>
      <input type="password" id="confirm-pw" placeholder="Repeat your new password" autocomplete="new-password" />
    </div>

    <button class="btn" id="submit-btn">Reset Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
'use strict';

const BACKEND = 'https://x-trend-backend.onrender.com';

const newPwEl       = document.getElementById('new-pw');
const confirmPwEl   = document.getElementById('confirm-pw');
const submitBtn     = document.getElementById('submit-btn');
const msgEl         = document.getElementById('msg');
const formWrap      = document.getElementById('form-wrap');
const strengthFill  = document.getElementById('strength-fill');
const strengthLabel = document.getElementById('strength-label');

function getToken() {
  return new URLSearchParams(window.location.search).get('token') || '';
}

function showMsg(text, type) {
  msgEl.textContent   = text;
  msgEl.className     = 'msg ' + type;
  msgEl.style.display = 'block';
}

function strength(pw) {
  if (!pw) return { pct: 0, label: '', color: '' };
  let s = 0;
  if (pw.length >= 8)          s++;
  if (pw.length >= 12)         s++;
  if (/[A-Z]/.test(pw))       s++;
  if (/[0-9]/.test(pw))       s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const levels = [
    { label: '',            color: '' },
    { label: 'Weak',        color: '#ef4444' },
    { label: 'Fair',        color: '#f59e0b' },
    { label: 'Good',        color: '#3b82f6' },
    { label: 'Strong',      color: '#22c55e' },
    { label: 'Very strong', color: '#7c3aed' },
  ];
  const l = levels[Math.min(s, 5)];
  return { pct: s * 20, label: l.label, color: l.color };
}

newPwEl.addEventListener('input', () => {
  const { pct, label, color } = strength(newPwEl.value);
  strengthFill.style.width      = pct + '%';
  strengthFill.style.background = color;
  strengthLabel.textContent     = label;
  strengthLabel.style.color     = color || '#6060a0';
});

(function init() {
  if (!getToken()) {
    document.getElementById('heading').textContent = 'Invalid reset link';
    document.getElementById('sub').textContent     = 'This link is invalid or has expired. Request a new one from the X-Trend extension.';
    formWrap.style.display = 'none';
  }
})();

submitBtn.addEventListener('click', async () => {
  const token       = getToken();
  const newPassword = newPwEl.value;
  const confirm     = confirmPwEl.value;

  if (!newPassword || newPassword.length < 8) {
    showMsg('Password must be at least 8 characters.', 'error');
    return;
  }
  if (newPassword !== confirm) {
    showMsg('Passwords do not match.', 'error');
    return;
  }

  submitBtn.disabled    = true;
  submitBtn.textContent = 'Resetting…';
  msgEl.style.display   = 'none';

  try {
    const res  = await fetch(`${BACKEND}/auth/reset-password`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, newPassword }),
    });
    const data = await res.json();

    if (res.ok) {
      formWrap.innerHTML = `
        <div class="msg success" style="display:block;">
          &#10003;&nbsp; Password reset successfully! You can now log in to the X-Trend extension.
        </div>
        <a href="index.html" class="back-link">&#8592; Back to homepage</a>
      `;
    } else {
      showMsg(data.error || 'Something went wrong. Please try again.', 'error');
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Reset Password';
    }
  } catch (err) {
    showMsg('Network error. Please check your connection and try again.', 'error');
    submitBtn.disabled    = false;
    submitBtn.textContent = 'Reset Password';
  }
});
</script>
</body>
</html>
